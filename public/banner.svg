<svg fill="none" width="800" height="80" viewBox="0 0 800 80" xmlns="http://www.w3.org/2000/svg">
  <foreignObject width="100%" height="100%">
    <div xmlns="http://www.w3.org/1999/xhtml">
      <style>
        /* Import font Nunito từ Google Fonts */
        @import url('https://fonts.googleapis.com/css2?family=Nunito:ital,wght@1,900&amp;display=swap');

        .container {
          font-family: 'Nunito', -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
          display: flex;
          flex-direction: column;
          align-items: center;
          justify-content: center; /* Căn giữa theo chiều dọc */
          height: 80px;
          background: transparent;
        }

        .title-text {
          font-size: 72px;
          font-weight: 900;
          letter-spacing: -1px;
          font-style: italic;
          margin: 0;
          padding: 0;
          display: flex;
          align-items: center;
          justify-content: center; 
          background: linear-gradient(to bottom, #FF007A 30%, #71717A 100%);
          -webkit-background-clip: text;
          background-clip: text;
          color: transparent;
          text-align: center;
          width: 100%;
        }
      </style>
      <div class="container">
        <div class="title-text">STUDYMIND</div>
      </div>
    </div>
  </foreignObject>
</svg>
